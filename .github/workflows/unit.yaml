name: PHP Unit Tests

on:
  push:
  pull_request:
    types: [ opened, reopened, synchronize ]

jobs:
  php84:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: shivammathur/setup-php@v2
      with:
        php-version: 8.4
    - run: |
        composer install --no-interaction --no-progress --no-suggest --quiet
        php vendor/bin/phpunit

  php85:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: 8.5
      - run: |
          composer install --no-interaction --no-progress --no-suggest --quiet
          php vendor/bin/phpunit
